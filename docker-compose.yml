version: "3.9"

services:
  apex_api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: apex_api
    restart: unless-stopped
    ports:
      - "8000:8000"
      - "9090:9090"
    environment:
      APEX_BETA_DEFAULT: "1.0"
      APEX_MILP_TIMEOUT_S: "0.2"
      APEX_LOG_LEVEL: "INFO"
      APEX_AUDIT_LOG_DIR: "/var/apex/audit"
      APEX_METRICS_ENABLED: "true"
    volumes:
      - audit_logs:/var/apex/audit
      - ./backend/models:/app/models:ro
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3

  prometheus:
    image: prom/prometheus:v2.50.0
    container_name: apex_prometheus
    restart: unless-stopped
    ports:
      - "9091:9090"
    volumes:
      - ./deploy/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=30d"
    depends_on: [apex_api]

  grafana:
    image: grafana/grafana:10.3.0
    container_name: apex_grafana
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: apex
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on: [prometheus]

volumes:
  audit_logs:
  prometheus_data:
  grafana_data:
